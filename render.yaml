        value: bidsphere.auction@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_PASS
        sync: false
      - key: SHIPROCKET_EMAIL
        value: thebumfuzzleshow@gmail.com
