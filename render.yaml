        sync: false
      - key: CLIENT_ORIGIN
        value: https://bid-sphere-online-auction-system.vercel.app
      - key: EMAIL_USER
        value: bidsphere.auction@gmail.com
      - key: EMAIL_PASS
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: df0spusrz
