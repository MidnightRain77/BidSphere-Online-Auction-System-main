        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: ADMIN_EMAIL
        value: parvaraval27@gmail.com
      - key: ADMIN_PASSWORD
        value: Admin@123
      - key: ADMIN_IP
        value: ::1
